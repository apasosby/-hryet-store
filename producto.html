<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Producto | HRYET</title>

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#050505;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:#000;
position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:32px;
font-weight:bold;
color:#b000ff;
}

nav a{
color:white;
text-decoration:none;
margin:0 15px;
}

nav a:hover{
color:#b000ff;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:60px;
padding:80px 8%;
}

.product-image img{
width:100%;
border-radius:25px;
}

.product-info h1{
font-size:48px;
margin-bottom:10px;
}

.price{
font-size:34px;
color:#b000ff;
margin:20px 0;
}

.description{
color:#cfcfcf;
line-height:1.8;
}

.options{
margin-top:30px;
}

.options h3{
margin-bottom:10px;
}

.size button,
.color button{

padding:12px 18px;

margin:5px;

border:none;

border-radius:30px;

cursor:pointer;

background:#222;

color:white;

}

.size button:hover,
.color button:hover{

background:#b000ff;

}

.buy{

margin-top:40px;

display:flex;

gap:20px;

}

.buy button{

flex:1;

padding:18px;

font-size:18px;

border:none;

border-radius:40px;

cursor:pointer;

}

.cart{

background:#b000ff;

color:white;

}

.buy-now{

background:white;

color:black;

}

footer{

margin-top:100px;

padding:40px;

text-align:center;

background:#000;

color:#888;

}

@media(max-width:900px){

.container{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<header>

<div class="logo">HRYET</div>

<nav>

<a href="index.html">Inicio</a>

<a href="tienda.html">Tienda</a>

<a href="#">Mi Cuenta</a>

<a href="#">Carrito</a>

</nav>

</header>

<section class="container">

<div class="product-image">

<img src="IMG_9138.jpeg">

</div>

<div class="product-info">

<h1>Luxury Hoodie</h1>

<div class="price">$129 USD</div>

<p class="description">

La colección premium HRYET combina moda, tecnología e identidad digital.
Cada prenda puede incorporar un código QR personalizado para compartir tu perfil, redes sociales o portafolio.

</p>

<div class="options">

<h3>Talla</h3>

<div class="size">

<button>S</button>

<button>M</button>

<button>L</button>

<button>XL</button>

</div>

<h3>Color</h3>

<div class="color">

<button>Negro</button>

<button>Blanco</button>

<button>Morado</button>

</div>

</div>

<div class="buy">

<button class="cart">Añadir al carrito</button>

<button class="buy-now">Comprar ahora</button>

</div>

</div>

</section>

<footer>

© 2026 HRYET | Luxury QR Fashion

</footer>

</body>
</html>
