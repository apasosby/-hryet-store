<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tienda | HRYET</title>

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#050505;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:black;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:32px;
font-weight:bold;
color:#b000ff;
}

nav a{
color:white;
text-decoration:none;
margin:0 15px;
transition:.3s;
}

nav a:hover{
color:#b000ff;
}

.hero{
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:60px;
margin-bottom:10px;
}

.hero p{
color:#bdbdbd;
font-size:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:35px;
padding:60px 8%;
}

.card{
background:#111;
border-radius:20px;
overflow:hidden;
transition:.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 35px rgba(176,0,255,.5);
}

.card img{
width:100%;
height:350px;
object-fit:cover;
}

.card h3{
padding:20px;
margin:0;
}

.card p{
padding:0 20px;
color:#b000ff;
font-size:22px;
font-weight:bold;
}

.card button{
margin:20px;
width:calc(100% - 40px);
padding:15px;
background:#b000ff;
border:none;
border-radius:40px;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

.card button:hover{
background:white;
color:#b000ff;
}

footer{
text-align:center;
padding:40px;
background:#000;
margin-top:80px;
color:#888;
}

</style>

</head>

<body>

<header>

<div class="logo">HRYET</div>

<nav>

<a href="index.html">Inicio</a>

<a href="tienda.html">Tienda</a>

<a href="#">Colecciones</a>

<a href="#">Historia</a>

<a href="#">Mi Cuenta</a>

<a href="#">Carrito</a>

</nav>

</header>

<section class="hero">

<h1>Tienda Oficial HRYET</h1>

<p>Moda • Tecnología • Identidad Digital</p>

</section>

<section class="products">

<div class="card">

<img src="IMG_5617.jpeg" alt="Producto">

<h3>Luxury Black Tee</h3>

<p>$89 USD</p>

<button>Añadir al carrito</button>

</div>

<div class="card">

<img src="IMG_5618.jpeg" alt="Producto">

<h3>Street Hoodie</h3>

<p>$129 USD</p>

<button>Añadir al carrito</button>

</div>

<div class="card">

<img src="IMG_9138.jpeg" alt="Producto">

<h3>Founder Edition</h3>

<p>$149 USD</p>

<button>Añadir al carrito</button>

</div>

</section>

<footer>

</footer>

</body>
</html>
