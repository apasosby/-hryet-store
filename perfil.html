<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Perfil HRYET</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:linear-gradient(180deg,#fffdf9,#f4f5ff);

padding:25px;

}

.card{

max-width:430px;

margin:auto;

background:white;

border-radius:30px;

padding:25px;

box-shadow:0 15px 45px rgba(0,0,0,.08);

animation:subir .8s;

}

@keyframes subir{

from{

opacity:0;

transform:translateY(40px);

}

to{

opacity:1;

transform:translateY(0);

}

}

.foto{

width:130px;

height:130px;

border-radius:50%;

background:#ddd;

margin:auto;

overflow:hidden;

}

.foto img{

width:100%;

height:100%;

object-fit:cover;

}

h1{

margin-top:20px;

text-align:center;

font-size:30px;

}

.usuario{

text-align:center;

color:#666;

margin-bottom:25px;

}

.stats{

display:flex;

justify-content:space-between;

margin:30px 0;

text-align:center;

}

.stats div{

flex:1;

}

.numero{

font-size:24px;

font-weight:bold;

color:#7b2cff;

}

.galeria{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:10px;

margin-top:20px;

}

.galeria div{

background:#ececec;

height:110px;

border-radius:18px;

}

.redes{

margin-top:35px;

display:flex;

flex-direction:column;

gap:15px;

}

.red{

background:#f7f7f7;

padding:15px;

border-radius:15px;

text-align:center;

font-weight:600;

transition:.3s;

}

.red:hover{

background:#7b2cff;

color:white;

}

.rank{

margin-top:40px;

}

.progress{

margin-top:15px;

height:15px;

background:#ddd;

border-radius:50px;

overflow:hidden;

}

.progress span{

display:block;

height:100%;

width:62%;

background:linear-gradient(90deg,#7b2cff,#00b7ff);

border-radius:50px;

}

.premio{

margin-top:20px;

background:#fff5dc;

padding:20px;

border-radius:18px;

text-align:center;

font-size:15px;

}

.like{

margin-top:30px;

background:#ff4b78;

color:white;

padding:18px;

border:none;

width:100%;

font-size:18px;

border-radius:18px;

cursor:pointer;

}

</style>

</head>

<body>

<div class="card">

<div class="foto">

<img src="IMG_5617.jpeg">

</div>

<h1>HenrryG</h1>

<div class="usuario">

Miembro HRYET #001842

</div>

<div class="stats">

<div>

<div class="numero">❤ 1.245</div>

Likes

</div>

<div>

<div class="numero">👀 8.930</div>

Visitas

</div>

<div>

<div class="numero">📱 532</div>

Escaneos

</div>

</div>

<h2>Galería</h2>

<div class="galeria">

<div></div>

<div></div>

<div></div>

<div></div>

<div></div>

<div></div>

</div>

<div class="redes">

<div class="red">Instagram</div>

<div class="red">TikTok</div>

<div class="red">Facebook</div>

</div>

<div class="rank">

<h2>Ranking HRYET</h2>

<div class="progress">

<span></span>

</div>

</div>

<div class="premio">

🎁

Cuando tu QR alcance los

<strong>10.000 escaneos</strong>

participarás por una edición especial HRYET.

</div>

<button class="like">

❤ Me gusta

</button>

</div>

</body>

</html>
