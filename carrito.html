<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrito | HRYET</title>

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#050505;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:#000;
}

.logo{
font-size:32px;
font-weight:bold;
color:#b000ff;
}

nav a{
color:white;
text-decoration:none;
margin:0 15px;
}

nav a:hover{
color:#b000ff;
}

.container{
width:90%;
max-width:1200px;
margin:auto;
padding:60px 0;
}

h1{
text-align:center;
margin-bottom:50px;
}

.item{
display:flex;
align-items:center;
justify-content:space-between;
background:#111;
padding:20px;
margin-bottom:20px;
border-radius:20px;
}

.item img{
width:120px;
border-radius:15px;
}

.info{
flex:1;
padding:0 20px;
}

.price{
font-size:24px;
color:#b000ff;
}

.quantity{
display:flex;
gap:10px;
align-items:center;
}

.quantity button{
width:35px;
height:35px;
border:none;
border-radius:50%;
background:#b000ff;
color:white;
font-size:18px;
cursor:pointer;
}

.remove{
background:red;
padding:10px 18px;
border:none;
border-radius:25px;
color:white;
cursor:pointer;
}

.summary{
margin-top:50px;
background:#111;
padding:30px;
border-radius:20px;
}

.summary h2{
margin-top:0;
}

.summary p{
font-size:20px;
}

.checkout{
width:100%;
padding:18px;
margin-top:20px;
background:#b000ff;
color:white;
border:none;
border-radius:40px;
font-size:20px;
cursor:pointer;
}

.checkout:hover{
background:#8d00d8;
}

footer{
margin-top:80px;
padding:30px;
text-align:center;
background:#000;
color:#777;
}

@media(max-width:768px){

.item{
flex-direction:column;
text-align:center;
}

.info{
padding:20px 0;
}

}

</style>

</head>

<body>

<header>

<div class="logo">HRYET</div>

<nav>

<a href="index.html">Inicio</a>

<a href="tienda.html">Tienda</a>

<a href="producto.html">Producto</a>

<a href="carrito.html">Carrito</a>

</nav>

</header>

<div class="container">

<h1>Mi Carrito</h1>

<div class="item">

<img src="IMG_9138.jpeg">

<div class="info">

<h2>Luxury Hoodie</h2>

<p class="price">$129 USD</p>

</div>

<div class="quantity">

<button>-</button>

<span>1</span>

<button>+</button>

</div>

<button class="remove">Eliminar</button>

</div>

<div class="summary">

<h2>Resumen</h2>

<p>Subtotal: <strong>$129 USD</strong></p>

<p>Envío: <strong>Gratis</strong></p>

<p>Total: <strong>$129 USD</strong></p>

<button class="checkout">
Continuar al Pago
</button>

</div>

</div>

<footer>

© 2026 HRYET | Luxury Fashion

</footer>

</body>
</html>
